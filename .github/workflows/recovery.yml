name: Abstract Recovery

# Tier-1 free-layer abstract backfill (S2 -> CrossRef -> Unpaywall) for papers
# ingested without an abstract. Separate from ingest.yml so its runtime can't
# eat into the ingest timeout. Public repo => unlimited free Actions minutes.

on:
  schedule:
    - cron: '15 */2 * * *'        # every 2 hours
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max papers to process this run'
        required: false
        default: '3000'
        type: string
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: false
        type: boolean

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ingest.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Recover abstracts (free layers)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          S2_API_KEY_2: ${{ secrets.S2_API_KEY_2 }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          CROSSREF_EMAIL: ${{ secrets.CROSSREF_EMAIL }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          # Refresh recovered papers' detail pages (no-op until these are set)
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        working-directory: pipeline
        run: >
          python recovery_sweep.py
          --limit ${{ inputs.limit || '3000' }}
          ${{ inputs.dry_run == true && '--dry-run' || '' }}

      - name: Notify on failure (ntfy)
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && { echo "NTFY_TOPIC unset; skip"; exit 0; }
          curl -sS \
            -H "Title: LiterView abstract-recovery cron FAILED" \
            -H "Priority: high" \
            -H "Tags: rotating_light" \
            -d "recovery.yml failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/$NTFY_TOPIC"
