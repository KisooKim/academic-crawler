name: Classify Papers

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max papers to classify'
        required: false
        default: ''
        type: string

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-classify.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-classify.txt

      - name: Classify new papers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: pipeline
        run: python classify_new_papers.py ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }}
        continue-on-error: true
