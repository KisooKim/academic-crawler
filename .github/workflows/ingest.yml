name: Paper Ingestion

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      skip_crossref:
        description: 'Skip Crossref ingestion'
        required: false
        default: false
        type: boolean
      days:
        description: 'Days to look back'
        required: false
        default: '7'
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ingest.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Ingest from OpenAlex (primary)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        working-directory: pipeline
        run: python ingest_journals.py --days ${{ inputs.days || '7' }}

      # if: always() so a failure of the OpenAlex primary above does NOT skip the
      # backup sources (previously they were skipped exactly when most needed).
      # continue-on-error kept on the secondaries to avoid alert fatigue from
      # transient Crossref/arXiv blips; the primary's failure still reddens the
      # job and fires the notify step below, and the freshness watchdog
      # (monitor.yml) catches "no papers landed" regardless.
      - name: Ingest from Crossref (secondary)
        if: ${{ always() && inputs.skip_crossref != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CROSSREF_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        working-directory: pipeline
        run: python ingest_crossref.py --days ${{ inputs.days || '7' }}
        continue-on-error: true

      - name: Ingest from arXiv
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: pipeline
        run: python ingest_arxiv.py --max-per-category 50
        continue-on-error: true

      - name: Deduplicate papers
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: pipeline
        run: python deduplicate.py --yes --method doi --days 3
        continue-on-error: true

      # Bust the LiterView ISR cache so author/journal/subfield/discipline feed
      # pages reflect the papers just ingested, instead of waiting for their TTL.
      # Best-effort: never fails the ingest job. No-op until the three secrets
      # (SITE_URL, CRON_SECRET, VERCEL_PROTECTION_BYPASS) are set on this repo.
      - name: Revalidate site cache
        if: always()
        continue-on-error: true
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "SITE_URL or CRON_SECRET not set; skipping revalidation"
            exit 0
          fi
          curl -sS -X POST "$SITE_URL/api/revalidate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            ${VERCEL_PROTECTION_BYPASS:+-H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS"} \
            -w "\nHTTP %{http_code}\n"

      # Fires only when a required step (OpenAlex primary, or the job overall)
      # failed. Secondary sources keep continue-on-error so they don't page you.
      - name: Notify on failure (ntfy)
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && { echo "NTFY_TOPIC unset; skip"; exit 0; }
          curl -sS \
            -H "Title: LiterView ingest cron FAILED" \
            -H "Priority: high" \
            -H "Tags: rotating_light" \
            -d "ingest.yml failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.sh/$NTFY_TOPIC"
